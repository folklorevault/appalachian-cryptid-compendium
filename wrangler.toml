# Cloudflare Pages + D1 Configuration
name = "cryptid-directory"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Configured for Cloudflare Pages deployment

# D1 Database Binding
# After creating your D1 database with `wrangler d1 create cryptid-db`,
# add the database_id below
[[d1_databases]]
binding = "DB"
database_name = "cryptid-db"
database_id = "342726f9-dea9-41ce-888d-1a5a138e541c"

# R2 Bucket for image storage
# Create with: wrangler r2 bucket create cryptid-images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "cryptid-images"

# Analytics Engine for tracking page views and events
[[analytics_engine_datasets]]
binding = "ANALYTICS_ENGINE"
dataset = "cryptid_analytics"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Admin authentication (set this in Cloudflare dashboard for production)
# ADMIN_API_KEY = "your-secret-key-here"